<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rwanda Air | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <a href="index.html" class="logo">
                <i class="fas fa-plane"></i> Rwanda Air
            </a>
            <h2>Welcome Back</h2>
            <p>Sign in to your Rwanda Air account</p>
        </div>
        
        <div class="auth-form">
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <div class="password-toggle">
                        <i class="fas fa-eye" id="togglePassword"></i>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn-primary btn-block">Sign In</button>
                
                <div class="auth-divider">
                    <span>or</span>
                </div>
                
                <button type="button" class="btn-secondary btn-block">
                    <i class="fab fa-google"></i> Sign in with Google
                </button>
                
                <p class="auth-link">
                    Don't have an account? <a href="#" id="registerLink">Sign up here</a>
                </p>
            </form>
        </div>
        
        <div class="auth-footer">
            <p>&copy; 2023 Rwanda Air. By signing in, you agree to our <a href="#">Terms & Conditions</a>.</p>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
